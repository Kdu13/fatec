<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio hardcore</title>
</head>

<body>
    <script>
        let numero = parseInt(prompt("Digite um número de 0 a 999: "));
        let centena = Math.floor(numero / 100);
        let dezena = Math.floor((numero % 100) / 10);
        let unidade = numero % 10;
        if (centena <= 0) {
            if (dezena <= 0) {
                if (unidade <= 0) {
                    document.write("Digite um número válido");
                } else {
                    document.write(numero + " = " + unidade + " unidade(s)");

                }
            } else {
                document.write(numero + " = " + dezena + " dezena(s), " + unidade + " unidade(s)");
            }
        } else {
            document.write(numero + " = " + centena + " centena(s), " + dezena + " dezena(s), " + unidade + " unidade(s)");
        } 
    </script>
</body>

</html>
