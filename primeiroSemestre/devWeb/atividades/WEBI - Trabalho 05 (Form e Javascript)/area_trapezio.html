<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Area do Trapezio</title>
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        legend {
            font-size: 2.5em;
            margin: 2em 0;
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.5);
        }
        label{
            font-size: 1.5em;
        }
        input{
            font-size: 1.5em;
            
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button{
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
        }
        main > p{
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3);
            font-size: 1.3em;  
            padding: 2em;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <a href="area_trapezio.html">Calculadora Area do Trapezio</a>
        <a href="bhaskara.html">Calculadora Bhaskara</a>
        <a href="juros_compostos.html">Calculadora de Juros Compostos</a>
        <a href="mov_uni_acelerado.html">Calculadora Movimento Uniforme Acelerado</a>
    </header>

    <main>
        <legend>Area do Trapezio</legend>
        <form onsubmit="calcular(event)">
            <label for="base_maior">Digite o valor da base maior: </label>
            <input type="text" id="base_maior" required><br>

            <label for="base_menor">Digite o valor da base menor: </label>
            <input type="text" id="base_menor" required><br>

            <label for="altura">Digite a altura: </label>
            <input type="text" id="altura" required><br>
            <button>Calcular</button>
        </form>

        <p id="resultado"></p>
    </main>

    <footer>
        <p> Calos Eduardo &copy; João Pedro</p>
    </footer>
    <script src="script.js"></script>
    <script>
         function calcular(event){
            event.preventDefault();
            const base_maior = parseFloat(document.getElementById("base_maior").value);
            const base_menor = parseFloat(document.getElementById("base_menor").value);
            const altura = parseFloat(document.getElementById("altura").value);
            const resultado = document.getElementById("resultado");

            let area_trapezio = ((base_maior + base_menor) * altura) / 2
            

            resultado.innerHTML = "Com a sua Base Maior de " + base_maior + "cm, sua Base Menor de " + base_menor + "cm e sua Altura de " + altura + "cm a Area do seu Trapezio tem " + area_trapezio.toFixed(2) + "cm².";
        }

    </script>
</body>
</html>
