<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Juros Compostos</title>
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        legend {
            font-size: 2.5em;
            margin: 2em 0;
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.5);
        }
        label{
            font-size: 1.5em;
        }
        input{
            font-size: 1.5em;
            
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button{
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
        }
        main > p{
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3);
            font-size: 1.3em;  
            padding: 2em;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <a href="area_trapezio.html">Calculadora Area do Trapezio</a>
        <a href="bhaskara.html">Calculadora Bhaskara</a>
        <a href="juros_compostos.html">Calculadora de Juros Compostos</a>
        <a href="mov_uni_acelerado.html">Calculadora Movimento Uniforme Acelerado</a>
    </header>

    <main>
        <legend>Calculadora de Juros Compostos</legend>
        <form onsubmit="calcular(event)">
            <label for="valor_inicial">Digite o valor inicial: </label>
            <input type="text" id="valor_inicial" required><br>

            <label for="taxa_juros">Digite a Taxa de Juros: </label>
            <input type="text" id="taxa_juros" required><br>

            <label for="anos">Digite quantos anos: </label>
            <input type="text" id="anos" required><br>
            <button>Calcular</button>
        </form>

        <p id="resultado"></p>
    </main>

    <footer>
        <p> Calos Eduardo &copy; João Pedro</p>
    </footer>
    <script src="script.js"></script>
    <script>
        function calcular(event){
            event.preventDefault();
            const valor_inicial = parseFloat(document.getElementById("valor_inicial").value);
            const taxa_juros = parseFloat(document.getElementById("taxa_juros").value);
            const anos = parseFloat(document.getElementById("anos").value);
            const resultado = document.getElementById("resultado");

            let valor_futuro = valor_inicial * Math.pow(1 + (taxa_juros / 100), anos)

            resultado.innerHTML = "Com seu investimento inicial de R$ " + valor_inicial + " e uma taxa de juros de " + taxa_juros + "%, em " + anos + " anos vai render R$" + valor_futuro.toFixed(2) + ".";
        }

    </script>
</body>
</html>
