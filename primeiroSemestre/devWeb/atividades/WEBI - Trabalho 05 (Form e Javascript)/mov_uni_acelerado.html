<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Movimento Uniforme Acelerado</title>
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        legend {
            font-size: 2.5em;
            margin: 2em 0;
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.5);
        }
        label{
            font-size: 1.5em;
        }
        input{
            font-size: 1.5em;
            
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button{
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
        }
        main > p{
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3);
            font-size: 1.3em;  
            padding: 2em;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <a href="area_trapezio.html">Calculadora Area do Trapezio</a>
        <a href="bhaskara.html">Calculadora Bhaskara</a>
        <a href="juros_compostos.html">Calculadora de Juros Compostos</a>
        <a href="mov_uni_acelerado.html">Calculadora Movimento Uniforme Acelerado</a>
    </header>

    <main>
        <legend>Calcular Movimento Uniforme Acelerado</legend>
        <form onsubmit="calcular(event)">
            <label for="velocidade_inicial">Digite a Velocidade Inicial: </label>
            <input type="text" id="velocidade_inicial" required><br>

            <label for="aceleracao">Digite a Aceleração: </label>
            <input type="text" id="aceleracao" required><br>

            <label for="tempo">Digite o Tempo: </label>
            <input type="text" id="tempo" required><br>
            <button>Calcular</button>
        </form>

        <p id="resultado"></p>
    </main>

    <footer>
        <p> Calos Eduardo &copy; João Pedro</p>
    </footer>
    <script src="script.js"></script>
    <script>
        function calcular(event){
            event.preventDefault();
            const velocidade_inicial = parseFloat(document.getElementById("velocidade_inicial").value);
            const aceleracao = parseFloat(document.getElementById("aceleracao").value);
            const tempo = parseFloat(document.getElementById("tempo").value);
            const resultado = document.getElementById("resultado");

            let distancia_percorrida = velocidade_inicial * tempo + 0.5 * aceleracao * Math.pow(tempo, 2)

            resultado.innerHTML = "Com sua Velocidade inicial de " + velocidade_inicial + "m/s e uma Aceleração de " + aceleracao + "m/s², em " + tempo + "seg vai percorrer " + distancia_percorrida.toFixed(2) + "mts.";
        }

    </script>
</body>
</html>
