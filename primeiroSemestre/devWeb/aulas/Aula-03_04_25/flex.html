<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX</title>
    <style>
        .container{
            background-color: lightskyblue;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            /* flex-direction: column; */
            /* flex-direction: column-reverse; */
            flex-direction: row;
            /* flex-direction: row-reverse; */
            justify-content: center;
            align-items: center;
            height: 300px;
        }
        .container > div{
            background-color: rgb(25, 243, 170);
            padding: 10px;
            border: 1px solid black;
            text-align: center;
            width: 150px;
        }

        .item1, .item5{
            flex-basis: 100%;
        }

        .item2{
            flex-grow: 1;
        }

        @media screen and (max-width: 600px){
            
            .container{
                flex-direction: row;
            }
            
            .item2{
                flex-grow: auto;
            }

            .container > div{
                flex-basis: 100%;
            }
        }

    </style>
</head>
<body>
    <div  class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div>3</div>
        <div>4</div>
        <div class="item5">5</div>
    </div>

</body>
</html>
