<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">HOME</a>

            <a href="for.html" style="color: orange;">FOR</a>

            <a href="array.html">ARRAY</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Tabuada</h2>
            <label>Número da Tabuada</label>
            <input type="number" id="num"><br>
            <button onclick="enviar()">Enviar</button>
        </section>

        <section class="resultado" id="resultado"></section>
    </main>
    
    


    <script>
        function enviar(){
            const numero = document.getElementById("num").value;
            const resultado = document.getElementById("resultado");
            resultado.innerHTML ='';

            if(numero == ""){
                alert("Informe um número");
            }
            else{
                for(let i = 1; i <= 10; i++){ // ++ = i+1
                    
                    
                    // resultado.innerHTML = resultado.innerHTML + i + '<br>';
                    resultado.innerHTML += numero + ' x '+ i + ' = ' + numero*i + '<br>';
                }
            }

        }
    </script>
</body>
</html>
