<body>
    <header>

            <a href="array.html">ARRAY</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Fatorial</h2>
            <label>Número do Fatorial</label>
            <input type="number" id="num"><br>
            <button onclick="enviar()">Enviar</button>
        </section>

        <section class="resultado" id="resultado"></section>
    </main>
    

    <script>
        function enviar(){
            const numero = document.getElementById("num").value;
            const resultado = document.getElementById("resultado");
            resultado.innerHTML ='';

            if(numero == ""){
                alert("Informe um número");
            }
            else{
                let c = 1;
                let fatorial = 1;
                while(c <= numero){
                    fatorial *= c
                    c++;
                }
                resultado.innerHTML = fatorial;
            }

        }
    </script>
</body>
