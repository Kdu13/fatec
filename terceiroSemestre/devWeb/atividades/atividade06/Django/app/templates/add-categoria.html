{% extends 'template.html' %}
{% block titulo %}Nova Categoria · DjangoApp{% endblock %}

{% block conteudo %}
<div class="page-header">
    <h2>Nova Categoria</h2>
    <a href="{% url 'categoria' %}" class="btn btn-ghost">← Voltar</a>
</div>

<div class="form-wrapper">
    <form action="{% url 'addcategoria' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Adicionar Categoria">
    </form>
</div>
{% endblock %}
