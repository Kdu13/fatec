{% extends 'template.html' %}
{% block titulo %}Novo Contato · DjangoApp{% endblock %}

{% block conteudo %}
<div class="page-header">
    <h2>Novo Contato</h2>
    <a href="{% url 'contato' %}" class="btn btn-ghost">← Voltar</a>
</div>

<div class="form-wrapper">
    <form action="{% url 'addcontato' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Adicionar Contato">
    </form>
</div>
{% endblock %}
