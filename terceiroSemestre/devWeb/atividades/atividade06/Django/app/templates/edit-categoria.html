{% extends 'template.html' %}
{% block titulo %}Editar Categoria · DjangoApp{% endblock %}
 
{% block conteudo %}
<div class="page-header">
    <h2>Editar Categoria</h2>
    <a href="{% url 'categoria' %}" class="btn btn-ghost">← Voltar</a>
</div>
 
<div class="form-wrapper">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Salvar Alterações">
    </form>
</div>
{% endblock %}
